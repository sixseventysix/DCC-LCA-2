NFSV4 {
    Graceless = true;
    Minor_Versions = 1, 2;
}

EXPORT {
    Export_Id = 1;
    Path = "/exports";
    Pseudo = "/exports";
    Access_Type = RW;
    Squash = No_Root_Squash;
    Disable_ACL = true;
    Protocols = 4;
    Transports = TCP;
    SecType = sys;
    FSAL {
        Name = VFS;
    }
}

LOG {
    Default_Log_Level = WARN;
    Components {
        EXPORT = INFO;
        NFS_STARTUP = INFO;
    }
}
